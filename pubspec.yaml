name: sssbuddy
description: "A new version of sssbuddy project"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  http: ^1.1.2
  flutter_launcher_icons: ^0.14.4

  cupertino_icons: ^1.0.8
  logger: ^2.6.2
  connectivity_plus: ^7.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0


  # Riverpod 3.x - Correct Compatible Versions
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2     # ← Updated

  dio: ^5.4.0
  record: ^6.2.0
  permission_handler: ^12.0.1
  just_audio: ^0.10.5
  url_launcher: ^6.2.5
  cached_network_image: ^3.3.1
  webview_flutter: ^4.7.0
  share_plus: ^12.0.1
  image_picker: ^1.2.1
  dropdown_button2: ^3.0.0
  latlong2: ^0.9.0
  flutter_map: ^8.2.2
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.8

  riverpod_generator: ^4.0.3      # ← Updated

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/images/buddy_logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/